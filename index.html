  const r = buildWeekPlan(cfg);
  html += `
  <div class="grid cols3">
    <div class="card"><div class="small">PROVA</div><h3>${examStr}</h3><div class="small">faltam ${r.daysLeft} dias (~${r.weeksLeft} semanas)</div></div>
    <div class="card"><div class="small">CARGA SEMANAL</div><h3>${(r.plan.length*r.minutesPerDay/60).toFixed(1)}h / semana</h3><div class="small">${r.plan.length} dia(s) × ${r.blocksPerDay} bloco(s) de ~${CRONO_BLOCO_MIN}min</div></div>
    <div class="card"><div class="small">CONTEÚDO</div><h3>${r.pending.length} de ${TOPICS.length} tópicos</h3><div class="small">${r.pending.length ? 'ainda não marcados como estudados' : 'todo o conteúdo já foi estudado ao menos 1x 🎉'}</div></div>
  </div>
  <div class="card">
    <h3>Semana modelo</h3>
    <p class="small">Repita esse padrão a cada semana até a prova. Conforme você for concluindo tópicos na aba 📖 Estudar, o cronograma passa a priorizar automaticamente o que ainda falta, e intercala mais revisão e simulados perto da data da prova.</p>
    <div class="topic-list">
      ${r.plan.map(dia=>`
        <div class="topic-card" style="align-items:flex-start;">
          <div style="min-width:100px;"><b>${dia.dia.label}</b></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
            ${dia.items.map(it=>renderCronoItem(it)).join('')}
          </div>
        </div>`).join('')}
    </div>
  </div>`;
  return html;
}

window.gerarCronograma = function(){
  const dias = {};
  CRONO_DIAS.forEach(d=>{ dias[d.k] = document.getElementById('dia_'+d.k).checked; });
  const minutos = Math.max(15, parseInt(document.getElementById('cronoMinutos').value)||60);
  state.cronogramaConfig = {dias, minutos};
  store.set('cronogramaConfig', state.cronogramaConfig, false);
  render();
};

function viewPomodoro(){
  const cfg = state.pomodoroConfig;
  const p = state.pomodoro;
  const phaseLabel = p.phase==='idle' ? 'Pronto para começar' : (p.phase==='study' ? 'Foco nos estudos' : 'Pausa — descanse');
  const timeDisplay = cfg.showTimer ? `<div class="timerbar" style="font-size:34px;padding:14px 26px;">${fmtTime(p.secondsLeft)}</div>` : `<div class="small">⏱ cronômetro oculto — você será avisado na hora certa</div>`;
  return `
  <section class="hero" style="padding-top:10px;">
    <div class="eyebrow">Técnica Pomodoro</div>
    <h2>Ciclos de foco e descanso</h2>
    <p>Configure o tempo de estudo e de pausa. O site avisa quando o tempo termina e pode travar a tela durante o descanso, se você preferir.</p>
  </section>
  <div class="grid cols2">
    <div class="card">
      <h3>Configurações</h3>
      <div class="field"><label>Minutos de estudo</label><input type="number" id="pStudyMin" min="1" max="120" value="${cfg.studyMin}"></div>
      <div class="field"><label>Minutos de pausa</label><input type="number" id="pBreakMin" min="1" max="60" value="${cfg.breakMin}"></div>
      <div class="field"><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="pLock" ${cfg.lock?'checked':''} style="width:auto;"> Travar a tela durante a pausa</label></div>
      <div class="field"><label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" id="pShow" ${cfg.showTimer?'checked':''} style="width:auto;"> Mostrar o cronômetro em contagem</label></div>
      <button class="btn secondary" onclick="savePomodoroConfig()">Salvar configurações</button>
    </div>
    <div class="card" style="text-align:center;">
      <div class="pill ${p.phase==='study'?'tecnico':(p.phase==='break'?'geografia':'')}" style="margin-bottom:10px;">${phaseLabel}</div>
      ${timeDisplay}
      <div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        ${p.phase==='idle' ? `<button class="btn" onclick="startPomodoro()">Iniciar foco →</button>` : `<button class="btn rust" onclick="stopPomodoro()">Encerrar ciclo</button>`}
      </div>
    </div>
  </div>
  ${(p.phase==='break' && cfg.lock) ? `<div class="overlay" id="lockOverlay"><h2>🍅 Pausa em andamento</h2><p>A tela ficará bloqueada até o fim do descanso.</p>${cfg.showTimer? `<div class="timerbar" style="font-size:44px;margin-top:14px;">${fmtTime(p.secondsLeft)}</div>` : `<p class="small">Volte quando ouvir o aviso sonoro.</p>`}</div>` : ''}
  `;
}

window.savePomodoroConfig = function(){
  const studyMin = Math.max(1, parseInt(document.getElementById('pStudyMin').value)||25);
  const breakMin = Math.max(1, parseInt(document.getElementById('pBreakMin').value)||5);
  const lock = document.getElementById('pLock').checked;
  const showTimer = document.getElementById('pShow').checked;
  state.pomodoroConfig = {studyMin, breakMin, lock, showTimer};
  store.set('pomodoroConfig', state.pomodoroConfig, false);
  render();
};

window.startPomodoro = function(){
  state.pomodoro.phase = 'study';
  state.pomodoro.secondsLeft = state.pomodoroConfig.studyMin*60;
  clearInterval(state.pomodoro.intervalId);
  state.pomodoro.intervalId = setInterval(pomodoroTick, 1000);
  render();
};
window.stopPomodoro = function(){
  clearInterval(state.pomodoro.intervalId);
  state.pomodoro = {phase:'idle', secondsLeft:0, intervalId:null};
  render();
};
function pomodoroTick(){
  const p = state.pomodoro;
  p.secondsLeft--;
  const timerEls = document.querySelectorAll('.timerbar');
  timerEls.forEach(el=>{ el.textContent = fmtTime(p.secondsLeft); });
  if(p.secondsLeft<=0){
    beep();
    if(p.phase==='study'){ p.phase='break'; p.secondsLeft = state.pomodoroConfig.breakMin*60; }
    else { p.phase='study'; p.secondsLeft = state.pomodoroConfig.studyMin*60; }
    render();
  }
}

/* ============ ADMIN ============ */
function viewAdmin(){
  if(!state.adminAuthed){
    return `
    <div class="card" style="max-width:400px;margin:40px auto;text-align:center;">
      <h3>🔒 Área Admin</h3>
      <p class="small">Introduz a senha de administrador para gerir perguntas, ranking e configurações.</p>
      <div class="field"><input type="password" id="adminPass" placeholder="Senha"></div>
      <div id="adminErr" class="errmsg"></div>
      <button class="btn" onclick="tryAdminLogin()">Entrar</button>
      <button class="btn secondary" onclick="goTab('inicio')">Cancelar</button>
      <p class="small" style="margin-top:14px;">Senha padrão: acq2026 (altere em Configurações após entrar).</p>
    </div>`;
  }
  const qlist = state.qbank.map(q=>`<div class="admin-q"><span><span class="pill ${q.disc}">${DISC_LABEL[q.disc]}</span> ${q.q.slice(0,70)}${q.q.length>70?'…':''}</span><button class="btn rust" style="padding:4px 10px;font-size:12px;" onclick="deleteQuestion('${q.id}')">🗑</button></div>`).join('');
  return `
  <div class="flex-between"><h2>🔒 Painel Admin</h2><button class="btn secondary" onclick="adminLogout()">Sair</button></div>
  <div class="grid cols2">
    <div class="card">
      <h3>⚙️ Configurações</h3>
      <div class="field"><label>Nº de questões por avaliação</label><input type="number" id="cfgSize" value="${state.config.examSize}" min="4"></div>
      <div class="field"><label>Tempo limite da avaliação (minutos, 0 = sem limite)</label><input type="number" id="cfgTime" value="${state.config.examTimeMin}" min="0"></div>
      <div class="field"><label>Nova senha de administrador</label><input type="text" id="cfgPass" placeholder="deixe em branco para manter"></div>
      <button class="btn" onclick="saveAdminConfig()">Guardar configurações</button>
    </div>
    <div class="card">
      <h3>🏆 Ranking</h3>
      <p class="small">${state.ranking.length} registros salvos.</p>
      <button class="btn rust" onclick="resetRanking()">🗑 Zerar ranking inteiro</button>
    </div>
  </div>
  <div class="card">
    <h3>📝 Perguntas <span class="badge-count">${state.qbank.length}</span></h3>
    <div class="admin-list">${qlist}</div>
    <h4 style="margin-top:18px;">+ Adicionar nova questão</h4>
    <div class="field"><label>Disciplina</label><select id="nqDisc">${Object.keys(DISC_LABEL).map(d=>`<option value="${d}">${DISC_LABEL[d]}</option>`).join('')}</select></div>
    <div class="field"><label>Tópico de estudo (para o modo prática na aba Estudar)</label><select id="nqTopic">${TOPICS.map(t=>`<option value="${t.id}">${t.title}</option>`).join('')}</select></div>
    <div class="field"><label>Enunciado</label><textarea id="nqQ" rows="2"></textarea></div>
    <div class="field"><label>Alternativa A</label><input type="text" id="nqA"></div>
    <div class="field"><label>Alternativa B</label><input type="text" id="nqB"></div>
    <div class="field"><label>Alternativa C</label><input type="text" id="nqC"></div>
    <div class="field"><label>Alternativa D</label><input type="text" id="nqD"></div>
    <div class="field"><label>Alternativa correta</label><select id="nqCorrect"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select></div>
    <div class="field"><label>Explicação (mostrada após responder)</label><textarea id="nqExp" rows="2"></textarea></div>
    <button class="btn" onclick="addQuestion()">Adicionar questão</button>
    <div id="nqErr" class="errmsg"></div>
  </div>`;
}

window.tryAdminLogin = function(){
  const val = document.getElementById('adminPass').value;
  if(val === state.config.adminPass){ state.adminAuthed = true; render(); }
  else { document.getElementById('adminErr').textContent = 'Senha incorreta.'; }
};
window.adminLogout = function(){ state.adminAuthed = false; render(); };

window.saveAdminConfig = async function(){
  const size = Math.max(4, parseInt(document.getElementById('cfgSize').value)||60);
  const time = Math.max(0, parseInt(document.getElementById('cfgTime').value)||70);
  const newPass = document.getElementById('cfgPass').value.trim();
  state.config = {examSize:size, examTimeMin:time, adminPass: newPass || state.config.adminPass};
  await store.set('config', state.config, true);
  render();
};

window.resetRanking = async function(){
  if(!confirm('Zerar o ranking inteiro? Esta ação não pode ser desfeita.')) return;
  state.ranking = [];
  await store.set('ranking', [], true);
  render();
};

window.deleteQuestion = async function(id){
  state.qbank = state.qbank.filter(q=>q.id!==id);
  await store.set('qbank', state.qbank, true);
  render();
};

window.addQuestion = async function(){
  const q = document.getElementById('nqQ').value.trim();
  const opts = ['nqA','nqB','nqC','nqD'].map(id=>document.getElementById(id).value.trim());
  const err = document.getElementById('nqErr');
  if(!q || opts.some(o=>!o)){ err.textContent = 'Preencha o enunciado e as quatro alternativas.'; return; }
  const newQ = {
    id: uid(),
    disc: document.getElementById('nqDisc').value,
    topic: document.getElementById('nqTopic').value,
    q, opts, a: parseInt(document.getElementById('nqCorrect').value),
    exp: document.getElementById('nqExp').value.trim() || 'Sem explicação cadastrada.'
  };
  state.qbank.push(newQ);
  await store.set('qbank', state.qbank, true);
  render();
};

function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

/* ============ BOOT ============ */
(async function(){
  if(fbAuth){
    // Espera a primeira resolução do estado de login (sessão salva ou visitante)
    // antes de carregar os dados pessoais, para buscá-los da fonte certa.
    await new Promise(resolve=>{
      const unsub = fbAuth.onAuthStateChanged(user=>{ state.authUser = user; unsub(); resolve(); });
    });
    // A partir daqui, reage a logins/logouts feitos durante o uso do site.
    fbAuth.onAuthStateChanged(async (user)=>{
      state.authUser = user;
      state.authBusy = false;
      state.authError = '';
      state.studyProgress = (await store.get('studyProgress', false)) || {};
      state.pomodoroConfig = (await store.get('pomodoroConfig', false)) || state.pomodoroConfig;
      state.cronogramaConfig = (await store.get('cronogramaConfig', false)) || state.cronogramaConfig;
      if(state.qbank) render();
    });
  }
  await ensureSeed();
  render();
})();
</script>
